name: build

on:
  push:
    branches: [master, main]
    tags: ['v*']
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.x' }
      - name: Install PlatformIO
        run: pip install --upgrade platformio
      - name: Build (cyd + emulator)
        run: |
          pio run -e cyd
          pio run -e emulator
      - name: Stage OTA asset
        run: cp .pio/build/cyd/firmware.bin claudemon-firmware.bin
      - uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: |
            claudemon-firmware.bin
            .pio/build/emulator/firmware.elf

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions: { contents: write }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.x' }
      - run: pip install --upgrade platformio
      - run: pio run -e cyd && cp .pio/build/cyd/firmware.bin claudemon-firmware.bin
      - uses: softprops/action-gh-release@v2
        with:
          files: claudemon-firmware.bin
