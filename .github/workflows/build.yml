name: build

on:
  push:
    branches: [master, main]
    tags: ['v*']
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.x' }
      - name: Install PlatformIO
        run: pip install --upgrade platformio
      - name: Build (cyd + emulator)
        run: |
          pio run -e cyd
          pio run -e emulator
      - name: Stage OTA asset
        run: cp .pio/build/cyd/firmware.bin claudemon-firmware.bin
      - uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: |
            claudemon-firmware.bin
            .pio/build/emulator/firmware.elf

  # Every merge to main cuts a release: the patch number is auto-bumped from the
  # newest v* tag, so the version lives in git history rather than in a file that
  # has to be hand-edited. Pushing a v* tag yourself still works and is how you
  # take a minor/major bump (v0.3.0) — the next auto-release continues from it.
  #
  # Devices OTA-flash whatever `releases/latest` points at (see otaFetchLatest in
  # src/main.cpp), so a release here reaches the hardware. Put [skip release] in
  # the merge commit / squashed PR title to land a change without shipping it.
  release:
    needs: build
    if: >-
      startsWith(github.ref, 'refs/tags/v') ||
      ((github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') &&
       !contains(github.event.head_commit.message, '[skip release]'))
    runs-on: ubuntu-latest
    permissions: { contents: write }
    concurrency: release   # serialize, so two quick merges can't claim the same tag
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }   # need the tag history to compute the next version
      - uses: actions/setup-python@v5
        with: { python-version: '3.x' }
      - run: pip install --upgrade platformio

      - name: Decide the version to release
        id: ver
        run: |
          set -euo pipefail
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VER="${GITHUB_REF_NAME#v}"                       # tag push: honour it verbatim
            # No existence check here: checkout fetches tags, so the tag that
            # triggered this run is always present by definition.
          else
            LAST=$(git tag --list 'v*' --sort=-v:refname | head -n1)
            LAST="${LAST:-v0.0.0}"
            IFS=. read -r MAJ MIN PAT <<<"${LAST#v}"
            VER="$MAJ.$MIN.$((PAT + 1))"                     # merge to main: bump the patch
            # A computed version that already exists means the bump raced with
            # another release; fail rather than silently re-point an old tag.
            if git rev-parse -q --verify "refs/tags/v$VER" >/dev/null; then
              echo "::error::v$VER already exists" && exit 1
            fi
          fi
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "Releasing v$VER"

      - name: Build firmware stamped with the release version
        run: |
          export PLATFORMIO_BUILD_FLAGS='-DCLAUDEMON_VERSION=\"'"${{ steps.ver.outputs.version }}"'\"'
          pio run -e cyd
          cp .pio/build/cyd/firmware.bin claudemon-firmware.bin

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}   # created at this commit if new
          name: v${{ steps.ver.outputs.version }}
          generate_release_notes: true
          files: claudemon-firmware.bin
