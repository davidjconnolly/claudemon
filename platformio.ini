; CYD-Claudemon — landscape Claude usage/cost monitor for the ESP32-2432S028R (CYD 2.8")
;
; Envs:
;   cyd       — real hardware build, talks to the live Anthropic API
;   emulator  — same firmware with -DFAKE_DATA, for Wokwi (no creds, no network calls)
;
; Build:  pio run -e cyd          (then -t upload)
;         pio run -e emulator     (artifacts consumed by wokwi.toml)

[platformio]
default_envs = cyd

[env]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
board_build.partitions = min_spiffs.csv

lib_deps =
    bodmer/TFT_eSPI@^2.5.43
    https://github.com/PaulStoffregen/XPT2046_Touchscreen.git
    bblanchon/ArduinoJson@^7.0.0
    https://github.com/tzapu/WiFiManager.git

; --- Display + touch wiring is identical to ohmyclawd; the panel is native
;     portrait (240x320) and we rotate to landscape (320x240) in firmware. ---
build_flags =
    -DCLAUDEMON_VERSION=\"0.2.9\"
    -DUSER_SETUP_LOADED=1
    -DILI9341_2_DRIVER=1
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=320
    -DTFT_MISO=12
    -DTFT_MOSI=13
    -DTFT_SCLK=14
    -DTFT_CS=15
    -DTFT_DC=2
    -DTFT_RST=-1
    -DTFT_BL=21
    -DTFT_BACKLIGHT_ON=HIGH
    -DSPI_FREQUENCY=55000000
    -DSPI_READ_FREQUENCY=20000000
    -DSPI_TOUCH_FREQUENCY=2500000
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1
    -DWM_NODEBUG=1

[env:cyd]
upload_port = /dev/ttyUSB0
upload_speed = 460800

; --- Wokwi emulator envs. WOKWI = run-in-simulator accommodations (join the
;     Wokwi-GUEST AP instead of the captive portal; no XPT2046 touch; panel not
;     pre-inverted). FAKE_DATA = scripted curves instead of real API calls. ---
[env:emulator]
; Offline UI check: scripted usage/cost data, no network, no creds. Auto-cycles.
build_flags =
    ${env.build_flags}
    -DWOKWI=1
    -DFAKE_DATA=1

[env:wokwi]
; LIVE Wokwi: the real firmware over the simulator's WiFi — real Anthropic API +
; the web config/status server. Enter credentials in a browser at
; http://localhost:9080/config (needs the Private IoT Gateway; F1 -> "Enable
; Private Wokwi IoT Gateway"). Lets you test real data without flashing.
build_flags =
    ${env.build_flags}
    -DWOKWI=1
